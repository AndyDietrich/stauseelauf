name: Update data.json

on:
  schedule:
    - cron: '0 * * * *'   # stündlich
  workflow_dispatch:        # manuelle Auslösung über GitHub Actions-Tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch data from Apps Script
        run: |
          mkdir -p data
          curl -sL "https://script.google.com/macros/s/AKfycbxDAMR_FixqdBtCTsahEDnYcES7e0luNaM8WWihaoOQltthoS7bJbpb2pU_nBFlACNd/exec?action=data" \
            -o data/data.json

      - name: Commit if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/data.json
          git diff --staged --quiet || (git commit -m "chore: update data.json" && git push)
